<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Eagle Next - Hanwha Work AI</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:Arial,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;color:#171717;background:#f4f5f7}.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.sidebar{background:#f7f7f8;border-right:1px solid #dedede;padding:24px 16px;display:flex;flex-direction:column}.brand{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}.brand-left{display:flex;align-items:center;gap:12px}.mark{position:relative;width:44px;height:44px}.mark span{position:absolute;border-style:solid;border-radius:50%;border-color:#f37321}.mark span:nth-child(1){left:3px;top:12px;width:36px;height:24px;border-width:5px;transform:rotate(-20deg)}.mark span:nth-child(2){left:12px;top:15px;width:30px;height:23px;border-width:4px;border-color:#f89b61;transform:rotate(24deg)}.mark span:nth-child(3){left:15px;top:7px;width:28px;height:28px;border-width:4px;border-color:#ffb37a;transform:rotate(14deg)}.brand b{display:block;font-size:24px}.brand small{color:#777}.new{height:50px;border:1px solid #f37321;border-radius:8px;background:white;color:#f37321;font-weight:800;font-size:15px}.nav{margin-top:24px;display:grid;gap:8px}.nav button{height:42px;border:0;border-radius:8px;background:transparent;text-align:left;padding:0 14px;font-weight:800;color:#444}.nav .active{background:#111;color:white}.history{border-top:1px solid #ddd;margin-top:24px;padding-top:20px}.history h3{font-size:12px;color:#777;margin:0 0 12px 14px}.history p{margin:0;padding:10px 14px;color:#555;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.user{margin-top:auto;border-top:1px solid #ddd;padding-top:14px;color:#555}.main{position:relative;overflow:hidden;background:white}.top{padding:30px 40px}.top .eyebrow{color:#f37321;font-weight:900;margin:0 0 8px}.top h1{font-size:30px;margin:0}.workspace{padding:20px 40px 36px}.center{min-height:760px;display:flex;flex-direction:column;justify-content:space-between;max-width:1120px;margin:0 auto}.recommend{text-align:center;margin-top:110px}.pill{display:inline-block;background:#fff3eb;color:#f37321;border-radius:8px;padding:6px 10px;font-size:13px;font-weight:900}.recommend h2{font-size:24px;margin:14px 0 28px}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:960px;margin:0 auto}.card{min-height:112px;border:1px solid #ddd;border-radius:8px;background:#f8f8f8;padding:24px;font-weight:800;color:#333}.spark{color:#f37321;font-size:22px;display:block;margin-bottom:12px}.prompt{max-width:1040px;margin:0 auto;border:1px solid #d5d5d5;border-radius:9px;background:white;padding:14px;box-shadow:0 6px 18px rgba(0,0,0,.05)}.prompt textarea{width:100%;min-height:72px;border:0;resize:none;font-size:18px;color:#555;outline:none}.prompt-foot{display:flex;justify-content:space-between;align-items:center}.tools{display:flex;gap:8px;color:#777}.send{width:46px;height:46px;border:0;border-radius:7px;background:#f37321;color:white;font-size:28px}@media(max-width:1000px){.app{grid-template-columns:1fr}.sidebar{display:none}.cards{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <div class="brand"><div class="brand-left"><div class="mark"><span></span><span></span><span></span></div><div><b>Eagle Next</b><small>Hanwha Work AI</small></div></div><span>↤</span></div>
      <button class="new">＋ New Chat</button>
      <nav class="nav"><button class="active">메인 챗봇</button><button>Q&amp;A</button><button>업무 검색</button><button>문서 관리</button><button>프로젝트</button><button>관리자</button></nav>
      <section class="history"><h3>최근 업무 히스토리</h3><p>RAG MVP 우선 구현 화면</p><p>외부망 접근 보안 조건</p><p>운영 장애 재발 방지 조치</p></section>
      <div class="user"><b>DA플랫폼팀 관리자</b><br><small>admin@company.example</small><br><br>POWERED BY HANWHA AI</div>
    </aside>
    <section class="main">
      <header class="top"><p class="eyebrow">Hanwha Work AI</p><h1>업무 히스토리 AI 플랫폼</h1></header>
      <div class="workspace">
        <section class="center">
          <div class="recommend">
            <span class="pill">Recommendation</span>
            <h2>어떤 업무를 도와드릴까요?</h2>
            <div class="cards"><div class="card"><span class="spark">✦</span>최근 결정사항 요약해줘</div><div class="card"><span class="spark">✦</span>계약서 보안 조건 찾아줘</div><div class="card"><span class="spark">✦</span>운영 장애 이력 알려줘</div></div>
          </div>
          <div class="prompt"><textarea>What task can I help you with?</textarea><div class="prompt-foot"><div class="tools">▦  ⇧  ▣</div><button class="send">›</button></div></div>
        </section>
      </div>
    </section>
  </main>
</body>
</html>
